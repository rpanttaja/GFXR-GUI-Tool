name: Build and Release

on:
  push:
    tags:
      - 'v*'          # trigger on version tags: v1.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual runs from the GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore core/GFXRTool.sln

      - name: Publish GFXRWatcher
        run: >
          dotnet publish core/GFXRWatcher/GFXRWatcher.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o publish/GFXRWatcher

      - name: Publish GFXRTool
        run: >
          dotnet publish core/GFXRTool/GFXRTool.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o publish/GFXRTool

      # Copy GFXRWatcher.exe into the GFXRTool output so everything ships together
      - name: Assemble release folder
        shell: pwsh
        run: |
          $out = "release/GFXRTool"
          New-Item -ItemType Directory -Force $out | Out-Null

          # Main tool files
          Copy-Item publish/GFXRTool/* $out -Recurse -Force

          # Watcher exe (the csproj copy target runs during Build, not Publish, so we do it here)
          Copy-Item publish/GFXRWatcher/GFXRWatcher.exe $out -Force

          # Launcher scripts from repo root
          Copy-Item "Launch GFXR Tool.bat" $out -Force

          # Layers folder (the GFXR proxy DLLs committed to the repo)
          if (Test-Path core/Layers) {
            Copy-Item core/Layers $out/Layers -Recurse -Force
          }

      - name: Zip release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "dev" }
          Compress-Archive -Path release/GFXRTool/* -DestinationPath "GFXRTool-$tag.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: GFXRTool-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
